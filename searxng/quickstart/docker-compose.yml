name: searxng

services:
  core:
    container_name: searxng-core
    image: docker.io/searxng/searxng:${SEARXNG_VERSION:-latest}
    restart: always
    volumes:
      - ./core-config/:/etc/searxng/:Z
      - core-data:/var/cache/searxng/
    networks:
      - searxng-net
    depends_on:
      - valkey

  mcp:
    container_name: searxng-mcp
    build:
      context: https://github.com/ihor-sokoliuk/MCP-searxng.git#main
    restart: always
    ports:
      - "${MCP_HOST:-127.0.0.1}:${MCP_PORT:-3000}:3000"
    environment:
      SEARXNG_URL: "http://searxng-core:8080"
      MCP_HTTP_PORT: "3000"
      MCP_HTTP_AUTH_TOKEN: "${MCP_AUTH_TOKEN}"
    networks:
      - searxng-net
    depends_on:
      - core

  valkey:
    container_name: searxng-valkey
    image: docker.io/valkey/valkey:9-alpine
    command: valkey-server --save 30 1 --loglevel warning
    restart: always
    volumes:
      - valkey-data:/data/
    networks:
      - searxng-net

volumes:
  core-data:
  valkey-data:

networks:
  searxng-net:
